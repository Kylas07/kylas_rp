<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            min-height: 100vh;
            --bg: #0d0f14;
            --surface: #13151c;
            --surface2: #1a1d28;
            --border: #2a2d3e;
            --border2: #3a3d52;
            --accent: #7eb8b0;
            --accent2: #c4a882;
            --text: #d4cfc8;
            --muted: #7a7870;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.15em;
        }

        .subtitle {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 40px;
            color: var(--muted);
            font-style: italic;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--accent);
            font-family: 'Cinzel', serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        input, textarea {
            width: 100%;
            padding: 14px 18px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(126, 184, 176, 0.05);
            box-shadow: 0 0 20px rgba(126, 184, 176, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        button {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 16px 40px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--accent);
            color: var(--bg);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(126, 184, 176, 0.3);
        }

        .info-box {
            background: rgba(196, 168, 130, 0.08);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-top: 40px;
        }

        .info-box h3 {
            color: var(--accent2);
            font-size: 20px;
            margin-bottom: 16px;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.1em;
        }

        .info-box p {
            opacity: 0.9;
            line-height: 1.6;
        }

        .contact-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .contact-method {
            background: var(--surface2);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            text-align: center;
            transition: all 0.3s ease;
        }

        .contact-method:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        .contact-method .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .contact-method .label {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .contact-method .value {
            font-size: 14px;
            font-weight: 500;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Contactez-moi</h1>
        <p class="subtitle">N'hésitez pas à me contacter pour toute question ou projet</p>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Nom complet</label>
                <input type="text" id="name" name="name" placeholder="Jean Dupont" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="jean.dupont@exemple.fr" required>
            </div>

            <div class="form-group">
                <label for="subject">Sujet</label>
                <input type="text" id="subject" name="subject" placeholder="Demande de collaboration" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Votre message..." required></textarea>
            </div>

            <button type="submit">Envoyer le message</button>
        </form>

        <div class="info-box">
            <h3>Autres moyens de me contacter</h3>
            <div class="contact-methods">
                <div class="contact-method">
                    <div class="icon">📧</div>
                    <div class="label">Email</div>
                    <div class="value">contact@exemple.fr</div>
                </div>
                <div class="contact-method">
                    <div class="icon">📱</div>
                    <div class="label">Téléphone</div>
                    <div class="value">+33 6 12 34 56 78</div>
                </div>
                <div class="contact-method">
                    <div class="icon">💼</div>
                    <div class="label">LinkedIn</div>
                    <div class="value">@votreprofil</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Message envoyé ! (Ceci est une démo)');
        });
    </script>
</body>
</html>
