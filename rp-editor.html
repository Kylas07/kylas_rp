<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur RP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

        :root {
            --bg: #0d0f14;
            --surface: #13151c;
            --surface2: #1a1d28;
            --border: #2a2d3e;
            --border2: #3a3d52;
            --accent: #7eb8b0;
            --accent2: #c4a882;
            --text: #d4cfc8;
            --muted: #7a7870;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 10%, rgba(126, 184, 176, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(196, 168, 130, 0.06) 0%, transparent 50%);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.15em;
            text-align: center;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 30px;
            color: var(--muted);
            font-style: italic;
            text-align: center;
        }

        .editor-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .editor-panel, .preview-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .panel-title {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            color: var(--accent2);
            letter-spacing: 0.1em;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        /* Settings */
        .settings {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .setting-group label {
            font-size: 12px;
            color: var(--accent);
            font-family: 'Cinzel', serif;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .setting-group input {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            font-size: 14px;
            padding: 8px 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .setting-group input:focus {
            border-color: var(--accent);
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text);
            cursor: pointer;
            font-family: 'Crimson Pro', serif;
            font-size: 14px;
            padding: 8px 14px;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 600;
        }

        .toolbar-btn:hover {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .toolbar-btn.italic {
            font-style: italic;
        }

        .toolbar-btn.underline {
            text-decoration: underline;
        }

        /* Text Editor */
        #rp-text {
            width: 100%;
            min-height: 400px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Crimson Pro', serif;
            font-size: 15px;
            padding: 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.6;
        }

        #rp-text:focus {
            border-color: var(--accent);
        }

        /* Word count */
        .word-count {
            text-align: right;
            font-size: 13px;
            color: var(--muted);
            margin-top: 8px;
            font-style: italic;
        }

        .word-count strong {
            color: var(--accent);
        }

        /* Preview */
        .preview-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            min-height: 500px;
            overflow: auto;
        }

        /* Import du CSS du forum pour la prévisualisation */
        .preview-container iframe {
            width: 100%;
            border: none;
            min-height: 500px;
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--accent);
            border-radius: 8px;
            color: var(--accent);
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 0.08em;
            padding: 12px 24px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .btn.primary {
            border-color: var(--accent2);
            color: var(--accent2);
        }

        .btn.primary:hover {
            background: var(--accent2);
            color: var(--bg);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            color: var(--accent2);
            margin-bottom: 20px;
        }

        .code-output {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--accent);
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .editor-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 28px;
            }

            .toolbar {
                gap: 6px;
            }

            .toolbar-btn {
                padding: 6px 10px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✍️ Éditeur RP</h1>
        <p class="subtitle">Préparez vos réponses RP avec prévisualisation en temps réel</p>

        <div class="editor-layout">
            <!-- Panel Éditeur -->
            <div class="editor-panel">
                <h2 class="panel-title">Paramètres</h2>
                
                <div class="settings">
                    <div class="setting-group">
                        <label>Titre de la réponse</label>
                        <input type="text" id="title-text" value="une déesse pour qui j'ai plus de flèches" placeholder="Titre...">
                    </div>
                    
                    <div class="setting-group">
                        <label>URL du GIF</label>
                        <input type="url" id="gif-url" value="https://64.media.tumblr.com/d5f964897cc2183fe43587f530b94152/e296345053383cb3-46/s640x960/d69a3beafee310085d6f868df5eb10afee80dab6.gif" placeholder="https://...">
                    </div>
                    
                    <div class="setting-group">
                        <label>Texte poétique (3 lignes)</label>
                        <input type="text" id="poem-line1" value="Je veux ton sang" placeholder="Ligne 1">
                        <input type="text" id="poem-line2" value="je sens tes vices" placeholder="Ligne 2">
                        <input type="text" id="poem-line3" value="dans les vents du marais," placeholder="Ligne 3">
                        <input type="text" id="poem-line4" value="tes cheveux envolés" placeholder="Ligne 4">
                    </div>
                    
                    <div class="setting-group">
                        <label>Partenaire RP (Ft.)</label>
                        <input type="text" id="partner-name" value="Isilwen" placeholder="Nom du partenaire">
                    </div>
                </div>

                <h2 class="panel-title" style="margin-top: 20px;">Votre réponse RP</h2>
                
                <div class="toolbar">
                    <button class="toolbar-btn" onclick="insertTag('b')" title="Gras"><strong>B</strong></button>
                    <button class="toolbar-btn italic" onclick="insertTag('i')" title="Italique"><em>I</em></button>
                    <button class="toolbar-btn underline" onclick="insertTag('u')" title="Souligné">U</button>
                    <button class="toolbar-btn" onclick="insertTag('br')" title="Saut de ligne">↵ Retour</button>
                </div>

                <textarea id="rp-text" placeholder="Écrivez votre réponse RP ici..."></textarea>
                
                <div class="word-count">
                    Nombre de mots : <strong id="word-count">0</strong>
                    <span style="margin-left: 20px; opacity: 0.6; transition: opacity 0.3s;" id="save-status">💾 Sauvegarde automatique activée</span>
                </div>
            </div>

            <!-- Panel Prévisualisation -->
            <div class="preview-panel">
                <h2 class="panel-title">Prévisualisation</h2>
                <div class="preview-container">
                    <iframe id="preview-frame"></iframe>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn" onclick="resetEditor()">Réinitialiser</button>
            <button class="btn primary" onclick="generateCode()">Générer le code</button>
        </div>
    </div>

    <!-- Modal pour le code généré -->
    <div class="modal" id="code-modal">
        <div class="modal-content">
            <h3 class="modal-title">Code généré</h3>
            <p style="color: var(--muted); margin-bottom: 16px; font-size: 14px;">
                Copiez ce code et collez-le dans votre réponse sur le forum
            </p>
            <div class="code-output" id="generated-code"></div>
            <div class="modal-actions">
                <button class="btn" onclick="copyCode()">Copier le code</button>
                <button class="btn" onclick="closeModal()">Fermer</button>
            </div>
        </div>
    </div>

    <script>
        // Éléments
        const titleInput = document.getElementById('title-text');
        const gifInput = document.getElementById('gif-url');
        const poemLine1 = document.getElementById('poem-line1');
        const poemLine2 = document.getElementById('poem-line2');
        const poemLine3 = document.getElementById('poem-line3');
        const poemLine4 = document.getElementById('poem-line4');
        const partnerInput = document.getElementById('partner-name');
        const rpTextarea = document.getElementById('rp-text');
        const previewFrame = document.getElementById('preview-frame');
        const wordCountEl = document.getElementById('word-count');

        // Mise à jour en temps réel
        function updatePreview() {
            const title = titleInput.value;
            const gifUrl = gifInput.value;
            const line1 = poemLine1.value;
            const line2 = poemLine2.value;
            const line3 = poemLine3.value;
            const line4 = poemLine4.value;
            const partner = partnerInput.value;
            const rpText = rpTextarea.value;
            const wordCount = countWords(rpText);

            wordCountEl.textContent = wordCount;

            const html = generateHTML(title, gifUrl, line1, line2, line3, line4, partner, rpText, wordCount);
            
            // Créer un document HTML complet pour l'iframe
            const fullHTML = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Asap+Condensed:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Instrument+Serif:ital@0;1&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://kylas07.github.io/projetchainsaw/caligularp.css" type="text/css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #fff;
        }
        calili {
            border-bottom: 2px solid var(--maincolocali);
        }
    </style>
</head>
<body>
    ${html}
</body>
</html>
            `;
            
            // Écrire dans l'iframe
            const iframeDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(fullHTML);
            iframeDoc.close();
            
            // Ajuster la hauteur de l'iframe
            setTimeout(() => {
                const height = iframeDoc.body.scrollHeight;
                previewFrame.style.height = (height + 40) + 'px';
            }, 100);

            // Sauvegarder automatiquement
            saveToLocalStorage();
        }

        // Sauvegarder dans localStorage
        function saveToLocalStorage() {
            const data = {
                title: titleInput.value,
                gifUrl: gifInput.value,
                poemLine1: poemLine1.value,
                poemLine2: poemLine2.value,
                poemLine3: poemLine3.value,
                poemLine4: poemLine4.value,
                partner: partnerInput.value,
                rpText: rpTextarea.value,
                lastSaved: new Date().toISOString()
            };
            
            try {
                localStorage.setItem('rp-editor-data', JSON.stringify(data));
                updateSaveStatus('Sauvegardé automatiquement');
            } catch (e) {
                console.error('Erreur de sauvegarde:', e);
            }
        }

        // Restaurer depuis localStorage
        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('rp-editor-data');
                if (saved) {
                    const data = JSON.parse(saved);
                    
                    titleInput.value = data.title || '';
                    gifInput.value = data.gifUrl || '';
                    poemLine1.value = data.poemLine1 || '';
                    poemLine2.value = data.poemLine2 || '';
                    poemLine3.value = data.poemLine3 || '';
                    poemLine4.value = data.poemLine4 || '';
                    partnerInput.value = data.partner || '';
                    rpTextarea.value = data.rpText || '';
                    
                    if (data.lastSaved) {
                        const date = new Date(data.lastSaved);
                        updateSaveStatus(`Dernière sauvegarde : ${date.toLocaleString('fr-FR')}`);
                    }
                    
                    updatePreview();
                    return true;
                }
            } catch (e) {
                console.error('Erreur de chargement:', e);
            }
            return false;
        }

        // Mettre à jour le statut de sauvegarde
        function updateSaveStatus(message) {
            const statusEl = document.getElementById('save-status');
            if (statusEl) {
                statusEl.textContent = message;
                statusEl.style.opacity = '1';
                setTimeout(() => {
                    statusEl.style.opacity = '0.6';
                }, 2000);
            }
        }

        // Compter les mots
        function countWords(text) {
            const cleanText = text.replace(/<[^>]*>/g, '').trim();
            if (!cleanText) return 0;
            return cleanText.split(/\s+/).length;
        }

        // Générer le HTML
        function generateHTML(title, gifUrl, line1, line2, line3, line4, partner, rpText, wordCount) {
            return `
<style>calili{border-bottom: 2px solid var(--maincolocali);}</style><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Asap+Condensed:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Instrument+Serif:ital@0;1&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet"><link href="https://kylas07.github.io/projetchainsaw/caligularp.css" type="text/css" rel="stylesheet">
<div style="display: flex;justify-content: center;"><div class="Asahi-hi"><div class="Asahi-top"><entt style="font-size: 20px;">${title}</entt><div class="Asahi-about"><div class="starz"><img src="https://2img.net/i.imgur.com/8HC36jC.png"></div></div><div class="Asahi-facts"><div class="wolf" style="background-image:url('${gifUrl}');"></div><div class="Asahi-quote" style="font-size:15px;">sous le ciel<img src="https://2img.net/i.imgur.com/8HC36jC.png"><div><span>et</span><span class="Asahi-block"></span></div><div><span>les étoiles</span><span class="Asahi-block"></span></div>pailletées</div><div class="Asahi-fact"><!----
-----><div><img src="https://i.imgur.com/ckWRzo5.png"><img src="https://i.imgur.com/ckWRzo5.png"></div><div class="imgillcali" style="color:white;font-style:italic;">${line1}<br>${line2}<br>${line3}<br>${line4}</div></div></div></div><!----
-----><div class="Asahi-mid"><div>
${rpText}
<br><br><calimot>Ft. ${partner} <i>${wordCount} mots</i></calimot></div></div><!----
-----><div class="Asahi-end"><a href="https://codepen.io/kyomeikylas" target="_blank">Kylas</a></div></div></div>
            `;
        }

        // Insérer une balise
        function insertTag(tag) {
            const textarea = rpTextarea;
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const selectedText = textarea.value.substring(start, end);
            
            let newText;
            if (tag === 'br') {
                newText = textarea.value.substring(0, start) + '<br>' + textarea.value.substring(end);
                textarea.value = newText;
                textarea.selectionStart = textarea.selectionEnd = start + 4;
            } else {
                if (selectedText) {
                    newText = textarea.value.substring(0, start) + `<${tag}>` + selectedText + `</${tag}>` + textarea.value.substring(end);
                    textarea.value = newText;
                    textarea.selectionStart = start;
                    textarea.selectionEnd = end + (tag.length * 2 + 5);
                } else {
                    newText = textarea.value.substring(0, start) + `<${tag}></${tag}>` + textarea.value.substring(end);
                    textarea.value = newText;
                    textarea.selectionStart = textarea.selectionEnd = start + tag.length + 2;
                }
            }
            
            textarea.focus();
            updatePreview();
        }

        // Générer le code
        function generateCode() {
            const title = titleInput.value;
            const gifUrl = gifInput.value;
            const line1 = poemLine1.value;
            const line2 = poemLine2.value;
            const line3 = poemLine3.value;
            const line4 = poemLine4.value;
            const partner = partnerInput.value;
            const rpText = rpTextarea.value;
            const wordCount = countWords(rpText);

            const code = generateHTML(title, gifUrl, line1, line2, line3, line4, partner, rpText, wordCount);
            
            document.getElementById('generated-code').textContent = code;
            document.getElementById('code-modal').classList.add('show');
        }

        // Copier le code
        function copyCode() {
            const code = document.getElementById('generated-code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('Code copié dans le presse-papier !');
            });
        }

        // Fermer le modal
        function closeModal() {
            document.getElementById('code-modal').classList.remove('show');
        }

        // Réinitialiser
        function resetEditor() {
            if (confirm('Voulez-vous vraiment réinitialiser l\'éditeur ? Cela effacera aussi la sauvegarde automatique.')) {
                titleInput.value = 'une déesse pour qui j\'ai plus de flèches';
                gifInput.value = 'https://64.media.tumblr.com/d5f964897cc2183fe43587f530b94152/e296345053383cb3-46/s640x960/d69a3beafee310085d6f868df5eb10afee80dab6.gif';
                poemLine1.value = 'Je veux ton sang';
                poemLine2.value = 'je sens tes vices';
                poemLine3.value = 'dans les vents du marais,';
                poemLine4.value = 'tes cheveux envolés';
                partnerInput.value = 'Isilwen';
                rpTextarea.value = '';
                
                // Effacer le localStorage
                localStorage.removeItem('rp-editor-data');
                updateSaveStatus('Données réinitialisées');
                
                updatePreview();
            }
        }

        // Event listeners
        titleInput.addEventListener('input', updatePreview);
        gifInput.addEventListener('input', updatePreview);
        poemLine1.addEventListener('input', updatePreview);
        poemLine2.addEventListener('input', updatePreview);
        poemLine3.addEventListener('input', updatePreview);
        poemLine4.addEventListener('input', updatePreview);
        partnerInput.addEventListener('input', updatePreview);
        rpTextarea.addEventListener('input', updatePreview);

        // Fermer modal en cliquant en dehors
        document.getElementById('code-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Initialiser - Charger depuis localStorage si disponible
        window.addEventListener('load', function() {
            const loaded = loadFromLocalStorage();
            if (!loaded) {
                // Si rien n'est sauvegardé, afficher la prévisualisation par défaut
                updatePreview();
            }
        });
    </script>
</body>
</html>
