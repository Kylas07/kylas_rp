<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablette Android - Portfolio</title>
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Background particles -->
    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Tablet -->
    <div class="tablet">
        <div class="camera"></div>
        
        <!-- Screen -->
        <div class="screen">
            <!-- Status bar -->
            <div class="status-bar">
                <div class="time" id="time">12:34</div>
                <div class="status-icons">
                    <svg class="icon" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/>
                    </svg>
                    <svg class="icon" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M17.778 8.222c-4.296-4.296-11.26-4.296-15.556 0A1 1 0 01.808 6.808c5.076-5.077 13.308-5.077 18.384 0a1 1 0 01-1.414 1.414zM14.95 11.05a7 7 0 00-9.9 0 1 1 0 01-1.414-1.414 9 9 0 0112.728 0 1 1 0 01-1.414 1.414zM12.12 13.88a3 3 0 00-4.242 0 1 1 0 01-1.415-1.415 5 5 0 017.072 0 1 1 0 01-1.415 1.415zM9 16a1 1 0 011-1h.01a1 1 0 110 2H10a1 1 0 01-1-1z" clip-rule="evenodd"/>
                    </svg>
                    <svg class="icon" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M8 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM15 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/>
                        <path d="M3 4a1 1 0 00-1 1v10a1 1 0 001 1h1.05a2.5 2.5 0 014.9 0H10a1 1 0 001-1V5a1 1 0 00-1-1H3zM14 7a1 1 0 00-1 1v6.05A2.5 2.5 0 0115.95 16H17a1 1 0 001-1v-5a1 1 0 00-.293-.707l-2-2A1 1 0 0015 7h-1z"/>
                    </svg>
                </div>
            </div>

            <!-- Back button -->
            <button class="back-button" id="backButton">
                <svg fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/>
                </svg>
                Retour
            </button>

            <!-- Page content container -->
            <div class="page-content" id="pageContent">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- Home screen -->
            <div class="home-screen">
                <div class="app-grid">
                    <div class="app" data-page="GenWuwa.html">
                        <div class="app-icon app-blue">
                        </div>
                        <div class="app-name">Fiche technique</div>
                        <div class="tooltip">Formulaire génération</div>
                    </div>

                    <div class="app" data-page="rp-tracker.html">
                        <div class="app-icon app-purple">
                        </div>
                        <div class="app-name">Tracker</div>
                        <div class="tooltip">Tracker rp</div>
                    </div>

                    <div class="app" data-page="admin.html">
                        <div class="app-icon app-green">
                            <span>👤</span>
                        </div>
                        <div class="app-name">Accès Admin</div>
                        <div class="tooltip">Bah faut le mdp pétasse</div>
                    </div>
                        <!-------
                    <div class="app" data-page="blog.html">
                        <div class="app-icon app-orange">
                            <span>📝</span>
                        </div>
                        <div class="app-name">Blog</div>
                        <div class="tooltip">Articles et actualités</div>
                    </div>

                    <div class="app" data-page="services.html">
                        <div class="app-icon app-pink">
                            <span>⚙️</span>
                        </div>
                        <div class="app-name">Services</div>
                        <div class="tooltip">Ce que je propose</div>
                    </div>

                    <div class="app" data-page="gallery.html">
                        <div class="app-icon app-cyan">
                            <span>🖼️</span>
                        </div>
                        <div class="app-name">Galerie</div>
                        <div class="tooltip">Photos et médias</div>
                    </div>

                    <div class="app" data-page="skills.html">
                        <div class="app-icon app-yellow">
                            <span>🎯</span>
                        </div>
                        <div class="app-name">Compétences</div>
                        <div class="tooltip">Mes compétences techniques</div>
                    </div>

                    <div class="app" data-page="cv.html">
                        <div class="app-icon app-indigo">
                            <span>📄</span>
                        </div>
                        <div class="app-name">CV</div>
                        <div class="tooltip">Télécharger mon CV</div>
                    </div>

                    <div class="app" data-page="projects.html">
                        <div class="app-icon app-teal">
                            <span>🚀</span>
                        </div>
                        <div class="app-name">Projets</div>
                        <div class="tooltip">Mes derniers projets</div>
                    </div>

                    <div class="app" data-page="testimonials.html">
                        <div class="app-icon app-red">
                            <span>💬</span>
                        </div>
                        <div class="app-name">Témoignages</div>
                        <div class="tooltip">Ce qu'on dit de mon travail</div>
                    </div>
                    ---->
                </div>

                <!-- Dock -->
                <div class="dock">
                    <div class="app">
                        <div class="app-icon app-blue2" href="https://codepen.io/kyomeikylas" target="_blank">
                        </div>
                    </div>
                    <div class="app" data-page="messages.html">
                        <div class="app-icon app-green2">
                            <span>💬</span>
                        </div>
                    </div>
                    <div class="app" data-page="settings.html">
                        <div class="app-icon app-purple2">
                            <span>⚙️</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="/js/index.js"></script>
</html>
